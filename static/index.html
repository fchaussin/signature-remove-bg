<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="Extract handwritten signatures from scanned documents. Lightweight, no ML, transparent PNG/WebP output.">
  <meta name="theme-color" content="#4a90d9">
  <title>Signature Remove Background</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <h1 data-i18n="app.title">Signature Extractor</h1>

  <!-- Upload -->
  <div id="dropzone" class="drop-zone" role="button" tabindex="0">
    <span data-i18n-html="dropzone.hint">Drop a scan, capture or image here,<br> <strong>click to choose a file</strong><br> or <kbd>Ctrl+V</kbd> anywhere to paste</span>
    <input type="file" accept="image/*" hidden class="file-input">
  </div>

  <!-- Editor -->
  <div id="editor" class="editor">
    <div class="controls">
      <div class="field">
        <label data-i18n="mode.label">Mode</label>
        <select data-param="mode">
          <option value="auto" data-i18n="mode.auto">Auto (dark + blue)</option>
          <option value="dark" data-i18n="mode.dark">Dark only</option>
          <option value="blue" data-i18n="mode.blue">Blue only</option>
        </select>
      </div>
      <div class="field">
        <label data-i18n="format.label">Format</label>
        <select data-param="format">
          <option value="png">PNG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
    </div>

    <div class="rack" role="list" aria-label="Effects chain">
      <div class="rack-slot" data-effect="threshold" role="listitem">
        <span class="rack-handle" aria-label="Drag to reorder" data-icon="grip" data-icon-size="14"></span>
        <span class="rack-icon" data-icon="sun" data-icon-size="16"></span>
        <label class="rack-toggle"><input type="checkbox" checked><span class="rack-toggle-mark"></span></label>
        <div class="rack-body">
          <label><span data-i18n="threshold.label">Luminosity threshold:</span> <span data-display="threshold">220</span></label>
          <input type="range" data-param="threshold" min="50" max="250" value="220">
        </div>
      </div>
      <div class="rack-slot" data-effect="blue_tolerance" role="listitem">
        <span class="rack-handle" aria-label="Drag to reorder" data-icon="grip" data-icon-size="14"></span>
        <span class="rack-icon" data-icon="droplet" data-icon-size="16"></span>
        <label class="rack-toggle"><input type="checkbox" checked><span class="rack-toggle-mark"></span></label>
        <div class="rack-body">
          <label><span data-i18n="blue_tolerance.label">Blue tolerance:</span> <span data-display="blue_tolerance">80</span></label>
          <input type="range" data-param="blue_tolerance" min="20" max="200" value="80">
        </div>
      </div>
      <div class="rack-slot" data-effect="smoothing" role="listitem">
        <span class="rack-handle" aria-label="Drag to reorder" data-icon="grip" data-icon-size="14"></span>
        <span class="rack-icon" data-icon="waves" data-icon-size="16"></span>
        <label class="rack-toggle"><input type="checkbox" checked><span class="rack-toggle-mark"></span></label>
        <div class="rack-body">
          <label><span data-i18n="smoothing.label">Edge smoothing:</span> <span data-display="smoothing">30</span></label>
          <input type="range" data-param="smoothing" min="0" max="100" value="30">
        </div>
      </div>
      <div class="rack-slot" data-effect="contrast" role="listitem">
        <span class="rack-handle" aria-label="Drag to reorder" data-icon="grip" data-icon-size="14"></span>
        <span class="rack-icon" data-icon="circle-half" data-icon-size="16"></span>
        <label class="rack-toggle"><input type="checkbox"><span class="rack-toggle-mark"></span></label>
        <div class="rack-body">
          <label><span data-i18n="contrast.label">Contrast:</span> <span data-display="contrast">0</span></label>
          <input type="range" data-param="contrast" min="0" max="100" value="0">
        </div>
      </div>
    </div>

    <div class="previews">
      <div class="panel" data-role="original">
        <div class="panel-label">
          <span data-i18n="panel.original">Original</span> <span class="res-info" style="font-size:.75rem;color:#999"></span>
          <span class="panel-tools">
            <button class="panel-tool-btn" data-action="zoom" aria-label="Zoom" title="Zoom 1:1" data-icon="search" data-icon-size="14"></button>
          </span>
        </div>
        <img class="preview-img" alt="Original image">
        <div class="res-hint" style="display:none"></div>
        <div class="actions">
          <button class="btn-secondary" data-action="crop" data-i18n="btn.crop">Crop</button>
        </div>
      </div>
      <div class="panel" data-role="extracted">
        <div class="panel-label">
          <span data-i18n="panel.extracted">Extracted signature</span> <span class="status" aria-live="polite"></span>
          <span class="panel-tools">
            <label class="compare-toggle" title="Before / After">
              <input type="checkbox" checked data-action="toggle-compare">
              <span class="compare-toggle-icon" data-icon="columns" data-icon-size="16"></span>
            </label>
            <button class="panel-tool-btn" data-action="zoom" aria-label="Zoom" title="Zoom 1:1" data-icon="search" data-icon-size="14"></button>
          </span>
        </div>
        <div class="compare-slider">
          <div class="preview-bg" style="background:repeating-conic-gradient(#ddd 0% 25%, #fff 0% 50%) 50%/16px 16px">
            <img class="preview-img" alt="Extracted signature">
          </div>
          <div class="compare-before">
            <img class="compare-before-img" alt="Original">
          </div>
          <div class="compare-handle" aria-label="Comparison slider" role="slider" tabindex="0">
            <div class="compare-line"></div>
            <div class="compare-knob" data-icon="arrows-h" data-icon-size="14"></div>
          </div>
        </div>
        <div class="bg-picker" role="group" aria-label="Background color">
          <span data-i18n="bg.label">Background:</span>
          <div class="bg-swatch" data-bg="white" role="button" tabindex="0" aria-label="White" data-i18n-title="bg.white" title="White"></div>
          <div class="bg-swatch active" data-bg="checker" role="button" tabindex="0" aria-label="Checker" data-i18n-title="bg.checker" title="Checker (transparency)"></div>
          <div class="bg-swatch" data-bg="dark" role="button" tabindex="0" aria-label="Dark" data-i18n-title="bg.dark" title="Dark"></div>
          <div class="bg-swatch" data-bg="blue" role="button" tabindex="0" aria-label="Light blue" data-i18n-title="bg.blue" title="Light blue"></div>
        </div>
        <div class="actions">
          <button data-action="download" data-i18n="btn.download">Download</button>
          <button class="btn-secondary" data-action="base64" data-i18n="btn.base64">Base64</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Zoom popup -->
  <div id="zoom" class="overlay overlay--dark" role="dialog" aria-modal="true" aria-label="Image zoom">
    <div class="zoom-viewport">
      <button class="zoom-close" aria-label="Close" data-icon="close" data-icon-size="18"></button>
      <img class="zoom-img" alt="Zoomed view">
      <div class="zoom-bar">
        <div class="zoom-hint"></div>
        <div class="zoom-bg-picker" role="group" aria-label="Background color">
          <span data-i18n="bg.label">Background:</span>
          <div class="bg-swatch" data-bg="white" role="button" tabindex="0" aria-label="White" data-i18n-title="bg.white" title="White"></div>
          <div class="bg-swatch active" data-bg="checker" role="button" tabindex="0" aria-label="Checker" data-i18n-title="bg.checker" title="Checker (transparency)"></div>
          <div class="bg-swatch" data-bg="dark" role="button" tabindex="0" aria-label="Dark" data-i18n-title="bg.dark" title="Dark"></div>
          <div class="bg-swatch" data-bg="blue" role="button" tabindex="0" aria-label="Light blue" data-i18n-title="bg.blue" title="Light blue"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Crop popup -->
  <div id="crop" class="overlay overlay--dim" role="dialog" aria-modal="true" aria-label="Crop tool">
    <div class="popup">
      <h2 data-i18n="crop.title">Crop the original</h2>
      <div class="crop-area">
        <canvas aria-label="Crop preview"></canvas>
        <div class="crop-shade" data-edge="top"></div>
        <div class="crop-shade" data-edge="bottom"></div>
        <div class="crop-shade" data-edge="left"></div>
        <div class="crop-shade" data-edge="right"></div>
        <div class="crop-handle" data-edge="top"></div>
        <div class="crop-handle" data-edge="bottom"></div>
        <div class="crop-handle" data-edge="left"></div>
        <div class="crop-handle" data-edge="right"></div>
      </div>
      <div class="popup-actions">
        <button class="btn-secondary" data-action="cancel" data-i18n="btn.cancel">Cancel</button>
        <button data-action="apply" data-i18n="btn.apply">Apply</button>
      </div>
    </div>
  </div>

  <!-- Base64 popup -->
  <div id="base64" class="overlay overlay--dim" role="dialog" aria-modal="true" aria-label="Base64 output">
    <div class="popup">
      <h2 data-i18n="base64.title">Base64 Export</h2>
      <div class="field">
        <label data-i18n="base64.format_label">Output format</label>
        <select data-param="base64-format">
          <option value="txt" selected>Plain text — Base64 value</option>
          <option value="uri">Data URI — data:content/type;base64</option>
          <option value="css_background_image">CSS Background Image — background-image:url()</option>
          <option value="html_favicon">HTML Favicon — &lt;link rel=icon /&gt;</option>
          <option value="html_hyperlink">HTML Hyperlink — &lt;a&gt;&lt;/a&gt;</option>
          <option value="html_img">HTML Image — &lt;img /&gt;</option>
          <option value="html_iframe">HTML Iframe — &lt;iframe&gt;&lt;/iframe&gt;</option>
          <option value="javascript_image">JavaScript Image — new Image()</option>
          <option value="javascript_popup">JavaScript Popup — window.open()</option>
          <option value="json">JSON — {image:{mime,data}}</option>
          <option value="xml">XML — &lt;image&gt;&lt;/image&gt;</option>
        </select>
      </div>
      <textarea class="base64-textarea" readonly aria-label="Base64 output"></textarea>
      <div class="popup-actions">
        <button class="btn-secondary" data-action="cancel" data-i18n="btn.cancel">Cancel</button>
        <button data-action="copy" data-i18n="btn.copy">Copy</button>
      </div>
    </div>
  </div>

  <script src="/static/vendor/purify.min.js"></script>
  <script src="/static/icons.js"></script>
  <script src="/static/i18n.js"></script>
  <script src="/static/fx-slot.js"></script>
  <script src="/static/fx-rack.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>

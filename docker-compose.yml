services:
  signature-remove-bg:
    image: fchaussin/signature-remove-bg:latest
    build: .
    ports:
      - "${PUBLIC_PORT:-8000}:8000"
    restart: unless-stopped
    mem_limit: 128m
    cpus: 1
    volumes:
      - ./custom.css:/app/frontend/custom.css:ro
    env_file:
      - path: .env
        required: false
